<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 700" width="100%" height="100%">
    <defs>

    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
        <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#000000" flood-opacity="0.06" />
    </filter>


    <filter id="shadow-sm" x="-5%" y="-5%" width="110%" height="110%">
        <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000000" flood-opacity="0.04" />
    </filter>


    <linearGradient id="grad-blue" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#3B82F6" />
        <stop offset="100%" stop-color="#1D4ED8" />
    </linearGradient>


    <linearGradient id="grad-purple" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#8B5CF6" />
        <stop offset="100%" stop-color="#6D28D9" />
    </linearGradient>


    <linearGradient id="grad-orange" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#F59E0B" />
        <stop offset="100%" stop-color="#D97706" />
    </linearGradient>


    <linearGradient id="grad-green" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#10B981" />
        <stop offset="100%" stop-color="#047857" />
    </linearGradient>


    <linearGradient id="grad-gray" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#6B7280" />
        <stop offset="100%" stop-color="#374151" />
    </linearGradient>


    <linearGradient id="grad-red" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#EF4444" />
        <stop offset="100%" stop-color="#B91C1C" />
    </linearGradient>


    <linearGradient id="grad-light-blue" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#EFF6FF" />
        <stop offset="100%" stop-color="#DBEAFE" />
    </linearGradient>


    <marker id="arrow" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
        <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="#4B5563" />
    </marker>


    <marker id="arrow-blue" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
        <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="#2563EB" />
    </marker>

    </defs>

    <!-- Background Canvas -->
    <rect width="1000" height="700" fill="#FFFFFF" />
    <rect width="1000" height="700" fill="#F1F5F9" opacity="0.4" />


    <!-- Group Boundary: USER INTERFACE -->
    <rect x="30" y="80" width="240" height="560" rx="16" fill="#F8FAFC" stroke="#CBD5E1" stroke-dasharray="4,4" stroke-width="1.5" />
    <rect x="46" y="70" width="128" height="20" rx="6" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1" />
    <text x="54" y="84" font-family="'Inter', sans-serif" font-weight="bold" font-size="11" fill="#475569">USER INTERFACE</text>


    <!-- Group Boundary: API & EVENT GATEWAY -->
    <rect x="290" y="80" width="240" height="560" rx="16" fill="#F8FAFC" stroke="#CBD5E1" stroke-dasharray="4,4" stroke-width="1.5" />
    <rect x="306" y="70" width="168" height="20" rx="6" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1" />
    <text x="314" y="84" font-family="'Inter', sans-serif" font-weight="bold" font-size="11" fill="#475569">API & EVENT GATEWAY</text>


    <!-- Group Boundary: GOOGLE ADK AGENT ORCHESTRATION -->
    <rect x="550" y="80" width="420" height="560" rx="16" fill="#F8FAFC" stroke="#CBD5E1" stroke-dasharray="4,4" stroke-width="1.5" />
    <rect x="566" y="70" width="256" height="20" rx="6" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1" />
    <text x="574" y="84" font-family="'Inter', sans-serif" font-weight="bold" font-size="11" fill="#475569">GOOGLE ADK AGENT ORCHESTRATION</text>


    <!-- Card: React Dashboard -->
    <rect x="50" y="140" width="200" height="70" rx="12" fill="url(#grad-blue)" stroke="none" stroke-width="1.5" filter="url(#shadow)" />


    <text x="66" y="171" font-family="'Inter', sans-serif" font-weight="bold" font-size="14" fill="#FFFFFF">React Dashboard</text>
    <text x="66" y="191" font-family="'Inter', sans-serif" font-size="12" fill="#E2E8F0">DD-style UI Widget Suite</text>


    <!-- Card: Action Console -->
    <rect x="50" y="320" width="200" height="70" rx="12" fill="url(#grad-blue)" stroke="none" stroke-width="1.5" filter="url(#shadow)" />


    <text x="66" y="351" font-family="'Inter', sans-serif" font-weight="bold" font-size="14" fill="#FFFFFF">Action Console</text>
    <text x="66" y="371" font-family="'Inter', sans-serif" font-size="12" fill="#E2E8F0">Firing alert simulation / override</text>


    <!-- Card: Reasoning Timeline -->
    <rect x="50" y="480" width="200" height="70" rx="12" fill="url(#grad-blue)" stroke="none" stroke-width="1.5" filter="url(#shadow)" />


    <text x="66" y="511" font-family="'Inter', sans-serif" font-weight="bold" font-size="14" fill="#FFFFFF">Reasoning Timeline</text>
    <text x="66" y="531" font-family="'Inter', sans-serif" font-size="12" fill="#E2E8F0">Live-scrolling terminal feed</text>


    <!-- Card: FastAPI Gateway -->
    <rect x="310" y="140" width="200" height="70" rx="12" fill="url(#grad-purple)" stroke="none" stroke-width="1.5" filter="url(#shadow)" />


    <text x="326" y="171" font-family="'Inter', sans-serif" font-weight="bold" font-size="14" fill="#FFFFFF">FastAPI Gateway</text>
    <text x="326" y="191" font-family="'Inter', sans-serif" font-size="12" fill="#E2E8F0">API routing & WS handling</text>


    <!-- Card: WebSocket Manager -->
    <rect x="310" y="280" width="200" height="70" rx="12" fill="url(#grad-purple)" stroke="none" stroke-width="1.5" filter="url(#shadow)" />


    <text x="326" y="311" font-family="'Inter', sans-serif" font-weight="bold" font-size="14" fill="#FFFFFF">WebSocket Manager</text>
    <text x="326" y="331" font-family="'Inter', sans-serif" font-size="12" fill="#E2E8F0">Real-time updates router</text>


    <!-- Card: Event Bus Bridge -->
    <rect x="310" y="400" width="200" height="70" rx="12" fill="url(#grad-purple)" stroke="none" stroke-width="1.5" filter="url(#shadow)" />


    <text x="326" y="431" font-family="'Inter', sans-serif" font-weight="bold" font-size="14" fill="#FFFFFF">Event Bus Bridge</text>
    <text x="326" y="451" font-family="'Inter', sans-serif" font-size="12" fill="#E2E8F0">Internal Event broker</text>


    <!-- Card: Persistence Store -->
    <rect x="310" y="520" width="200" height="70" rx="12" fill="url(#grad-gray)" stroke="none" stroke-width="1.5" filter="url(#shadow)" />


    <text x="326" y="551" font-family="'Inter', sans-serif" font-weight="bold" font-size="14" fill="#FFFFFF">Persistence Store</text>
    <text x="326" y="571" font-family="'Inter', sans-serif" font-size="12" fill="#E2E8F0">JSON Case-File Store</text>


    <!-- Card: ADK Workflow Orchestrator -->
    <rect x="580" y="140" width="360" height="70" rx="12" fill="url(#grad-red)" stroke="none" stroke-width="1.5" filter="url(#shadow)" />


    <text x="596" y="171" font-family="'Inter', sans-serif" font-weight="bold" font-size="14" fill="#FFFFFF">ADK Workflow Orchestrator</text>
    <text x="596" y="191" font-family="'Inter', sans-serif" font-size="12" fill="#E2E8F0">Initializes case files & controls workflow</text>


    <!-- Group Boundary: 8 SPECIALIZED COOPERATIVE AGENTS -->
    <rect x="575" y="235" width="370" height="255" rx="16" fill="#F8FAFC" stroke="#CBD5E1" stroke-dasharray="4,4" stroke-width="1.5" />
    <rect x="591" y="225" width="272" height="20" rx="6" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1" />
    <text x="599" y="239" font-family="'Inter', sans-serif" font-weight="bold" font-size="11" fill="#475569">8 SPECIALIZED COOPERATIVE AGENTS</text>


    <!-- Subcard: Intake Agent -->
    <rect x="590" y="270" width="160" height="45" rx="8" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1" filter="url(#shadow-sm)" />


    <text x="602" y="290" font-family="'Inter', sans-serif" font-weight="bold" font-size="12" fill="#1E293B">Intake Agent</text>
    <text x="602" y="306" font-family="'Inter', sans-serif" font-size="10.5" fill="#64748B">Alert triage & sanity check</text>


    <!-- Subcard: Triage Agent -->
    <rect x="765" y="270" width="160" height="45" rx="8" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1" filter="url(#shadow-sm)" />


    <text x="777" y="290" font-family="'Inter', sans-serif" font-weight="bold" font-size="12" fill="#1E293B">Triage Agent</text>
    <text x="777" y="306" font-family="'Inter', sans-serif" font-size="10.5" fill="#64748B">Impact & severity categorization</text>


    <!-- Subcard: Log Analyzer -->
    <rect x="590" y="330" width="160" height="45" rx="8" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1" filter="url(#shadow-sm)" />


    <text x="602" y="350" font-family="'Inter', sans-serif" font-weight="bold" font-size="12" fill="#1E293B">Log Analyzer</text>
    <text x="602" y="366" font-family="'Inter', sans-serif" font-size="10.5" fill="#64748B">Pattern recognition & errors</text>


    <!-- Subcard: Root Cause Agent -->
    <rect x="765" y="330" width="160" height="45" rx="8" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1" filter="url(#shadow-sm)" />


    <text x="777" y="350" font-family="'Inter', sans-serif" font-weight="bold" font-size="12" fill="#1E293B">Root Cause Agent</text>
    <text x="777" y="366" font-family="'Inter', sans-serif" font-size="10.5" fill="#64748B">Hypothesis testing</text>


    <!-- Subcard: Evaluator Agent -->
    <rect x="590" y="390" width="160" height="45" rx="8" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1" filter="url(#shadow-sm)" />


    <text x="602" y="410" font-family="'Inter', sans-serif" font-weight="bold" font-size="12" fill="#1E293B">Evaluator Agent</text>
    <text x="602" y="426" font-family="'Inter', sans-serif" font-size="10.5" fill="#64748B">Verification & checks</text>


    <!-- Subcard: Recovery Planner -->
    <rect x="765" y="390" width="160" height="45" rx="8" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1" filter="url(#shadow-sm)" />


    <text x="777" y="410" font-family="'Inter', sans-serif" font-weight="bold" font-size="12" fill="#1E293B">Recovery Planner</text>
    <text x="777" y="426" font-family="'Inter', sans-serif" font-size="10.5" fill="#64748B">Action roadmap creation</text>


    <!-- Subcard: Escalation Agent -->
    <rect x="590" y="440" width="160" height="40" rx="8" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1" filter="url(#shadow-sm)" />


    <text x="602" y="458" font-family="'Inter', sans-serif" font-weight="bold" font-size="12" fill="#1E293B">Escalation Agent</text>
    <text x="602" y="474" font-family="'Inter', sans-serif" font-size="10.5" fill="#64748B">PagerDuty integration</text>


    <!-- Subcard: Report Generator -->
    <rect x="765" y="440" width="160" height="40" rx="8" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1" filter="url(#shadow-sm)" />


    <text x="777" y="458" font-family="'Inter', sans-serif" font-weight="bold" font-size="12" fill="#1E293B">Report Generator</text>
    <text x="777" y="474" font-family="'Inter', sans-serif" font-size="10.5" fill="#64748B">JSON & MD post-mortem</text>


    <!-- Card: MCP Tool Registry -->
    <rect x="580" y="520" width="360" height="70" rx="12" fill="url(#grad-green)" stroke="none" stroke-width="1.5" filter="url(#shadow)" />


    <text x="596" y="551" font-family="'Inter', sans-serif" font-weight="bold" font-size="14" fill="#FFFFFF">MCP Tool Registry</text>
    <text x="596" y="571" font-family="'Inter', sans-serif" font-size="12" fill="#E2E8F0">Monitoring & Incident MCP Toolkits</text>


    <line x1="150" y1="210" x2="150" y2="320" stroke="#4B5563" stroke-width="2" stroke-dasharray="" marker-end="url(#arrow)" />


    <line x1="250" y1="175" x2="310" y2="175" stroke="#3B82F6" stroke-width="2" stroke-dasharray="" marker-end="url(#arrow)" />


    <text x="280.0" y="169.0" font-family="'Inter', sans-serif" font-size="11" fill="#3B82F6" font-weight="bold" text-anchor="middle">REST Requests</text>


    <line x1="310" y1="315" x2="250" y2="315" stroke="#10B981" stroke-width="2" stroke-dasharray="" marker-end="url(#arrow)" />


    <text x="280.0" y="309.0" font-family="'Inter', sans-serif" font-size="11" fill="#10B981" font-weight="bold" text-anchor="middle">WebSocket Push</text>


    <line x1="510" y1="175" x2="580" y2="175" stroke="#8B5CF6" stroke-width="2" stroke-dasharray="" marker-end="url(#arrow)" />


    <text x="545.0" y="169.0" font-family="'Inter', sans-serif" font-size="11" fill="#8B5CF6" font-weight="bold" text-anchor="middle">Execute Workflow</text>


    <line x1="760" y1="210" x2="760" y2="270" stroke="#EF4444" stroke-width="2" stroke-dasharray="" marker-end="url(#arrow)" />


    <text x="760.0" y="234.0" font-family="'Inter', sans-serif" font-size="11" fill="#EF4444" font-weight="bold" text-anchor="middle">Spawn</text>


    <line x1="760" y1="495" x2="760" y2="520" stroke="#10B981" stroke-width="2" stroke-dasharray="" marker-end="url(#arrow)" />


    <text x="760.0" y="501.5" font-family="'Inter', sans-serif" font-size="11" fill="#10B981" font-weight="bold" text-anchor="middle">Call Tools</text>


    <line x1="580" y1="555" x2="510" y2="555" stroke="#10B981" stroke-width="2" stroke-dasharray="" marker-end="url(#arrow)" />


    <text x="545.0" y="549.0" font-family="'Inter', sans-serif" font-size="11" fill="#10B981" font-weight="bold" text-anchor="middle">Data</text>


    <line x1="410" y1="470" x2="410" y2="520" stroke="#6B7280" stroke-width="2" stroke-dasharray="" marker-end="url(#arrow)" />


    <line x1="410" y1="350" x2="410" y2="400" stroke="#6B7280" stroke-width="2" stroke-dasharray="" marker-end="url(#arrow)" />

</svg>
