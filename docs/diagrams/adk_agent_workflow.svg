<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 720" width="100%" height="100%">
    <defs>

    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
        <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#000000" flood-opacity="0.06" />
    </filter>


    <filter id="shadow-sm" x="-5%" y="-5%" width="110%" height="110%">
        <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000000" flood-opacity="0.04" />
    </filter>


    <linearGradient id="grad-blue" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#3B82F6" />
        <stop offset="100%" stop-color="#1D4ED8" />
    </linearGradient>


    <linearGradient id="grad-purple" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#8B5CF6" />
        <stop offset="100%" stop-color="#6D28D9" />
    </linearGradient>


    <linearGradient id="grad-orange" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#F59E0B" />
        <stop offset="100%" stop-color="#D97706" />
    </linearGradient>


    <linearGradient id="grad-green" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#10B981" />
        <stop offset="100%" stop-color="#047857" />
    </linearGradient>


    <linearGradient id="grad-gray" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#6B7280" />
        <stop offset="100%" stop-color="#374151" />
    </linearGradient>


    <linearGradient id="grad-red" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#EF4444" />
        <stop offset="100%" stop-color="#B91C1C" />
    </linearGradient>


    <linearGradient id="grad-light-blue" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#EFF6FF" />
        <stop offset="100%" stop-color="#DBEAFE" />
    </linearGradient>


    <marker id="arrow" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
        <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="#4B5563" />
    </marker>


    <marker id="arrow-blue" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
        <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="#2563EB" />
    </marker>

    </defs>

    <!-- Background Canvas -->
    <rect width="900" height="720" fill="#FFFFFF" />
    <rect width="900" height="720" fill="#F1F5F9" opacity="0.4" />


    <text x="30" y="40" font-family="'Inter', sans-serif" font-weight="bold" font-size="16" fill="#1E293B" text-anchor="start">GOOGLE ADK MULTI-AGENT INCIDENT LIFECYCLE WORKFLOW</text>


    <!-- Card: 1. Alert Ingestion -->
    <rect x="50" y="90" width="180" height="60" rx="12" fill="url(#grad-gray)" stroke="none" stroke-width="1.5" filter="url(#shadow)" />


    <text x="66" y="116" font-family="'Inter', sans-serif" font-weight="bold" font-size="14" fill="#FFFFFF">1. Alert Ingestion</text>
    <text x="66" y="136" font-family="'Inter', sans-serif" font-size="12" fill="#E2E8F0">Web Hook / Simulator</text>


    <!-- Card: 2. Intake Agent -->
    <rect x="270" y="90" width="180" height="60" rx="12" fill="url(#grad-orange)" stroke="none" stroke-width="1.5" filter="url(#shadow)" />


    <text x="286" y="116" font-family="'Inter', sans-serif" font-weight="bold" font-size="14" fill="#FFFFFF">2. Intake Agent</text>
    <text x="286" y="136" font-family="'Inter', sans-serif" font-size="12" fill="#E2E8F0">Sanity filter & validation</text>


    <!-- Card: 3. Coordinator -->
    <rect x="490" y="90" width="180" height="60" rx="12" fill="url(#grad-red)" stroke="none" stroke-width="1.5" filter="url(#shadow)" />


    <text x="506" y="116" font-family="'Inter', sans-serif" font-weight="bold" font-size="14" fill="#FFFFFF">3. Coordinator</text>
    <text x="506" y="136" font-family="'Inter', sans-serif" font-size="12" fill="#E2E8F0">ADK Orchestration Engine</text>


    <!-- Card: 4. Triage Agent -->
    <rect x="490" y="210" width="180" height="60" rx="12" fill="url(#grad-orange)" stroke="none" stroke-width="1.5" filter="url(#shadow)" />


    <text x="506" y="236" font-family="'Inter', sans-serif" font-weight="bold" font-size="14" fill="#FFFFFF">4. Triage Agent</text>
    <text x="506" y="256" font-family="'Inter', sans-serif" font-size="12" fill="#E2E8F0">Incident severity & impact</text>


    <!-- Card: 5. Log Analyzer -->
    <rect x="270" y="210" width="180" height="60" rx="12" fill="url(#grad-orange)" stroke="none" stroke-width="1.5" filter="url(#shadow)" />


    <text x="286" y="236" font-family="'Inter', sans-serif" font-weight="bold" font-size="14" fill="#FFFFFF">5. Log Analyzer</text>
    <text x="286" y="256" font-family="'Inter', sans-serif" font-size="12" fill="#E2E8F0">Log tailing & extraction</text>


    <!-- Card: 6. Root Cause Agent -->
    <rect x="50" y="210" width="180" height="60" rx="12" fill="url(#grad-orange)" stroke="none" stroke-width="1.5" filter="url(#shadow)" />


    <text x="66" y="236" font-family="'Inter', sans-serif" font-weight="bold" font-size="14" fill="#FFFFFF">6. Root Cause Agent</text>
    <text x="66" y="256" font-family="'Inter', sans-serif" font-size="12" fill="#E2E8F0">Heuristic deduction</text>


    <!-- Card: 7. Evaluator Agent -->
    <rect x="50" y="330" width="180" height="60" rx="12" fill="url(#grad-orange)" stroke="none" stroke-width="1.5" filter="url(#shadow)" />


    <text x="66" y="356" font-family="'Inter', sans-serif" font-weight="bold" font-size="14" fill="#FFFFFF">7. Evaluator Agent</text>
    <text x="66" y="376" font-family="'Inter', sans-serif" font-size="12" fill="#E2E8F0">Verify hypothesis/health</text>


    <!-- Card: 8. Recovery Planner -->
    <rect x="270" y="330" width="180" height="60" rx="12" fill="url(#grad-orange)" stroke="none" stroke-width="1.5" filter="url(#shadow)" />


    <text x="286" y="356" font-family="'Inter', sans-serif" font-weight="bold" font-size="14" fill="#FFFFFF">8. Recovery Planner</text>
    <text x="286" y="376" font-family="'Inter', sans-serif" font-size="12" fill="#E2E8F0">Suggest playbook runbook</text>


    <!-- Card: 9. Escalation Agent -->
    <rect x="490" y="330" width="180" height="60" rx="12" fill="url(#grad-orange)" stroke="none" stroke-width="1.5" filter="url(#shadow)" />


    <text x="506" y="356" font-family="'Inter', sans-serif" font-weight="bold" font-size="14" fill="#FFFFFF">9. Escalation Agent</text>
    <text x="506" y="376" font-family="'Inter', sans-serif" font-size="12" fill="#E2E8F0">Alert stakeholder/pager</text>


    <!-- Card: 10. Report Generator -->
    <rect x="490" y="450" width="180" height="60" rx="12" fill="url(#grad-orange)" stroke="none" stroke-width="1.5" filter="url(#shadow)" />


    <text x="506" y="476" font-family="'Inter', sans-serif" font-weight="bold" font-size="14" fill="#FFFFFF">10. Report Generator</text>
    <text x="506" y="496" font-family="'Inter', sans-serif" font-size="12" fill="#E2E8F0">Generate post-mortem</text>


    <!-- Card: 11. Incident Closed -->
    <rect x="270" y="450" width="180" height="60" rx="12" fill="url(#grad-green)" stroke="none" stroke-width="1.5" filter="url(#shadow)" />


    <text x="286" y="476" font-family="'Inter', sans-serif" font-weight="bold" font-size="14" fill="#FFFFFF">11. Incident Closed</text>
    <text x="286" y="496" font-family="'Inter', sans-serif" font-size="12" fill="#E2E8F0">Archive Case File</text>


    <!-- Group Boundary: MITIGATION LOOP -->
    <rect x="690" y="90" width="180" height="420" rx="16" fill="#FEF3C7" stroke="#F59E0B" stroke-dasharray="4,4" stroke-width="1.5" />
    <rect x="706" y="80" width="136" height="20" rx="6" fill="#FFFFFF" stroke="#F59E0B" stroke-width="1" />
    <text x="714" y="94" font-family="'Inter', sans-serif" font-weight="bold" font-size="11" fill="#475569">MITIGATION LOOP</text>


    <!-- Card: Manual Approval -->
    <rect x="700" y="130" width="160" height="80" rx="12" fill="url(#grad-purple)" stroke="none" stroke-width="1.5" filter="url(#shadow)" />


    <text x="716" y="166" font-family="'Inter', sans-serif" font-weight="bold" font-size="14" fill="#FFFFFF">Manual Approval</text>
    <text x="716" y="186" font-family="'Inter', sans-serif" font-size="12" fill="#E2E8F0">Wait for human OK</text>


    <!-- Card: Mitigation Agent -->
    <rect x="700" y="250" width="160" height="80" rx="12" fill="url(#grad-orange)" stroke="none" stroke-width="1.5" filter="url(#shadow)" />


    <text x="716" y="286" font-family="'Inter', sans-serif" font-weight="bold" font-size="14" fill="#FFFFFF">Mitigation Agent</text>
    <text x="716" y="306" font-family="'Inter', sans-serif" font-size="12" fill="#E2E8F0">Execute rollback / fix</text>


    <!-- Card: Verification Run -->
    <rect x="700" y="370" width="160" height="80" rx="12" fill="url(#grad-gray)" stroke="none" stroke-width="1.5" filter="url(#shadow)" />


    <text x="716" y="406" font-family="'Inter', sans-serif" font-weight="bold" font-size="14" fill="#FFFFFF">Verification Run</text>
    <text x="716" y="426" font-family="'Inter', sans-serif" font-size="12" fill="#E2E8F0">Assert health metrics</text>


    <line x1="230" y1="120" x2="270" y2="120" stroke="#4B5563" stroke-width="2" stroke-dasharray="" marker-end="url(#arrow)" />


    <line x1="450" y1="120" x2="490" y2="120" stroke="#4B5563" stroke-width="2" stroke-dasharray="" marker-end="url(#arrow)" />


    <line x1="580" y1="150" x2="580" y2="210" stroke="#4B5563" stroke-width="2" stroke-dasharray="" marker-end="url(#arrow)" />


    <line x1="490" y1="240" x2="450" y2="240" stroke="#4B5563" stroke-width="2" stroke-dasharray="" marker-end="url(#arrow)" />


    <line x1="270" y1="240" x2="230" y2="240" stroke="#4B5563" stroke-width="2" stroke-dasharray="" marker-end="url(#arrow)" />


    <line x1="140" y1="270" x2="140" y2="330" stroke="#4B5563" stroke-width="2" stroke-dasharray="" marker-end="url(#arrow)" />


    <line x1="230" y1="360" x2="270" y2="360" stroke="#4B5563" stroke-width="2" stroke-dasharray="" marker-end="url(#arrow)" />


    <line x1="450" y1="360" x2="490" y2="360" stroke="#4B5563" stroke-width="2" stroke-dasharray="" marker-end="url(#arrow)" />


    <line x1="580" y1="390" x2="580" y2="450" stroke="#4B5563" stroke-width="2" stroke-dasharray="" marker-end="url(#arrow)" />


    <line x1="490" y1="480" x2="450" y2="480" stroke="#4B5563" stroke-width="2" stroke-dasharray="" marker-end="url(#arrow)" />


    <line x1="360" y1="330" x2="700" y2="170" stroke="#8B5CF6" stroke-width="2" stroke-dasharray="2,2" marker-end="url(#arrow)" />


    <text x="530.0" y="244.0" font-family="'Inter', sans-serif" font-size="11" fill="#8B5CF6" font-weight="bold" text-anchor="middle">Request</text>


    <line x1="780" y1="210" x2="780" y2="250" stroke="#10B981" stroke-width="2" stroke-dasharray="" marker-end="url(#arrow)" />


    <text x="780.0" y="224.0" font-family="'Inter', sans-serif" font-size="11" fill="#10B981" font-weight="bold" text-anchor="middle">Approve</text>


    <line x1="780" y1="330" x2="780" y2="370" stroke="#10B981" stroke-width="2" stroke-dasharray="" marker-end="url(#arrow)" />


    <text x="780.0" y="344.0" font-family="'Inter', sans-serif" font-size="11" fill="#10B981" font-weight="bold" text-anchor="middle">Run Fix</text>


    <line x1="700" y1="410" x2="360" y2="450" stroke="#10B981" stroke-width="2" stroke-dasharray="" marker-end="url(#arrow)" />


    <text x="530.0" y="424.0" font-family="'Inter', sans-serif" font-size="11" fill="#10B981" font-weight="bold" text-anchor="middle">Healthy</text>

</svg>
