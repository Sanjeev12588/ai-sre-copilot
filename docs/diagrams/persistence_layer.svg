<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" width="100%" height="100%">
    <defs>

    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
        <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#000000" flood-opacity="0.06" />
    </filter>


    <filter id="shadow-sm" x="-5%" y="-5%" width="110%" height="110%">
        <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000000" flood-opacity="0.04" />
    </filter>


    <linearGradient id="grad-blue" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#3B82F6" />
        <stop offset="100%" stop-color="#1D4ED8" />
    </linearGradient>


    <linearGradient id="grad-purple" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#8B5CF6" />
        <stop offset="100%" stop-color="#6D28D9" />
    </linearGradient>


    <linearGradient id="grad-orange" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#F59E0B" />
        <stop offset="100%" stop-color="#D97706" />
    </linearGradient>


    <linearGradient id="grad-green" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#10B981" />
        <stop offset="100%" stop-color="#047857" />
    </linearGradient>


    <linearGradient id="grad-gray" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#6B7280" />
        <stop offset="100%" stop-color="#374151" />
    </linearGradient>


    <linearGradient id="grad-red" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#EF4444" />
        <stop offset="100%" stop-color="#B91C1C" />
    </linearGradient>


    <linearGradient id="grad-light-blue" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#EFF6FF" />
        <stop offset="100%" stop-color="#DBEAFE" />
    </linearGradient>


    <marker id="arrow" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
        <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="#4B5563" />
    </marker>


    <marker id="arrow-blue" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
        <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="#2563EB" />
    </marker>

    </defs>

    <!-- Background Canvas -->
    <rect width="900" height="500" fill="#FFFFFF" />
    <rect width="900" height="500" fill="#F1F5F9" opacity="0.4" />


    <text x="30" y="40" font-family="'Inter', sans-serif" font-weight="bold" font-size="16" fill="#1E293B" text-anchor="start">STATE PERSISTENCE & CASE FILE SERIALIZATION</text>


    <!-- Card: IncidentState
(Pydantic Schema) -->
    <rect x="50" y="180" width="180" height="90" rx="12" fill="url(#grad-orange)" stroke="none" stroke-width="1.5" filter="url(#shadow)" />


    <text x="66" y="221" font-family="'Inter', sans-serif" font-weight="bold" font-size="14" fill="#FFFFFF">IncidentState
(Pydantic Schema)</text>
    <text x="66" y="241" font-family="'Inter', sans-serif" font-size="12" fill="#E2E8F0">Title, Description, Environment, Timeline, Status, Report</text>


    <line x1="230" y1="225" x2="320" y2="225" stroke="#4B5563" stroke-width="2" stroke-dasharray="" marker-end="url(#arrow)" />


    <text x="275.0" y="219.0" font-family="'Inter', sans-serif" font-size="11" fill="#4B5563" font-weight="bold" text-anchor="middle">Serialize</text>


    <!-- Card: JsonIncidentStore
(Persistence Engine) -->
    <rect x="320" y="140" width="220" height="170" rx="12" fill="url(#grad-purple)" stroke="none" stroke-width="1.5" filter="url(#shadow)" />


    <text x="336" y="221" font-family="'Inter', sans-serif" font-weight="bold" font-size="14" fill="#FFFFFF">JsonIncidentStore
(Persistence Engine)</text>
    <text x="336" y="241" font-family="'Inter', sans-serif" font-size="12" fill="#E2E8F0">Directory: data/incidents/

Methods:
- save()
- update()
- load()
- delete()</text>


    <line x1="540" y1="225" x2="630" y2="225" stroke="#4B5563" stroke-width="2" stroke-dasharray="" marker-end="url(#arrow)" />


    <text x="585.0" y="219.0" font-family="'Inter', sans-serif" font-size="11" fill="#4B5563" font-weight="bold" text-anchor="middle">Write to file</text>


    <!-- Card: Filesystem / Storage
(JSON files) -->
    <rect x="630" y="180" width="220" height="90" rx="12" fill="url(#grad-gray)" stroke="none" stroke-width="1.5" filter="url(#shadow)" />


    <text x="646" y="221" font-family="'Inter', sans-serif" font-weight="bold" font-size="14" fill="#FFFFFF">Filesystem / Storage
(JSON files)</text>
    <text x="646" y="241" font-family="'Inter', sans-serif" font-size="12" fill="#E2E8F0">INC-XXXXXXXX.json

Demo: file-system isolation</text>

</svg>
