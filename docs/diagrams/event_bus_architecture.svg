<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" width="100%" height="100%">
    <defs>

    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
        <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#000000" flood-opacity="0.06" />
    </filter>


    <filter id="shadow-sm" x="-5%" y="-5%" width="110%" height="110%">
        <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000000" flood-opacity="0.04" />
    </filter>


    <linearGradient id="grad-blue" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#3B82F6" />
        <stop offset="100%" stop-color="#1D4ED8" />
    </linearGradient>


    <linearGradient id="grad-purple" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#8B5CF6" />
        <stop offset="100%" stop-color="#6D28D9" />
    </linearGradient>


    <linearGradient id="grad-orange" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#F59E0B" />
        <stop offset="100%" stop-color="#D97706" />
    </linearGradient>


    <linearGradient id="grad-green" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#10B981" />
        <stop offset="100%" stop-color="#047857" />
    </linearGradient>


    <linearGradient id="grad-gray" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#6B7280" />
        <stop offset="100%" stop-color="#374151" />
    </linearGradient>


    <linearGradient id="grad-red" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#EF4444" />
        <stop offset="100%" stop-color="#B91C1C" />
    </linearGradient>


    <linearGradient id="grad-light-blue" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#EFF6FF" />
        <stop offset="100%" stop-color="#DBEAFE" />
    </linearGradient>


    <marker id="arrow" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
        <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="#4B5563" />
    </marker>


    <marker id="arrow-blue" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
        <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="#2563EB" />
    </marker>

    </defs>

    <!-- Background Canvas -->
    <rect width="900" height="500" fill="#FFFFFF" />
    <rect width="900" height="500" fill="#F1F5F9" opacity="0.4" />


    <text x="30" y="40" font-family="'Inter', sans-serif" font-weight="bold" font-size="16" fill="#1E293B" text-anchor="start">PUB-SUB EVENT BROKER & REAL-TIME WS STREAMING</text>


    <!-- Group Boundary: EVENT PRODUCERS -->
    <rect x="40" y="90" width="220" height="360" rx="16" fill="#F8FAFC" stroke="#CBD5E1" stroke-dasharray="4,4" stroke-width="1.5" />
    <rect x="56" y="80" width="136" height="20" rx="6" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1" />
    <text x="64" y="94" font-family="'Inter', sans-serif" font-weight="bold" font-size="11" fill="#475569">EVENT PRODUCERS</text>


    <!-- Card: Intake Agent -->
    <rect x="60" y="150" width="180" height="60" rx="12" fill="url(#grad-orange)" stroke="none" stroke-width="1.5" filter="url(#shadow)" />


    <text x="76" y="176" font-family="'Inter', sans-serif" font-weight="bold" font-size="14" fill="#FFFFFF">Intake Agent</text>
    <text x="76" y="196" font-family="'Inter', sans-serif" font-size="12" fill="#E2E8F0">INCIDENT_CREATED</text>


    <!-- Card: Root Cause Agent -->
    <rect x="60" y="240" width="180" height="60" rx="12" fill="url(#grad-orange)" stroke="none" stroke-width="1.5" filter="url(#shadow)" />


    <text x="76" y="266" font-family="'Inter', sans-serif" font-weight="bold" font-size="14" fill="#FFFFFF">Root Cause Agent</text>
    <text x="76" y="286" font-family="'Inter', sans-serif" font-size="12" fill="#E2E8F0">ROOT_CAUSE_DETECTED</text>


    <!-- Card: Report Generator -->
    <rect x="60" y="330" width="180" height="60" rx="12" fill="url(#grad-orange)" stroke="none" stroke-width="1.5" filter="url(#shadow)" />


    <text x="76" y="356" font-family="'Inter', sans-serif" font-weight="bold" font-size="14" fill="#FFFFFF">Report Generator</text>
    <text x="76" y="376" font-family="'Inter', sans-serif" font-size="12" fill="#E2E8F0">REPORT_GENERATED</text>


    <!-- Card: Internal Event Bus
(Pub-Sub Broker) -->
    <rect x="320" y="210" width="220" height="100" rx="12" fill="url(#grad-purple)" stroke="none" stroke-width="1.5" filter="url(#shadow)" />


    <text x="336" y="256" font-family="'Inter', sans-serif" font-weight="bold" font-size="14" fill="#FFFFFF">Internal Event Bus
(Pub-Sub Broker)</text>
    <text x="336" y="276" font-family="'Inter', sans-serif" font-size="12" fill="#E2E8F0">Synchronous memory dispatch</text>


    <!-- Group Boundary: EVENT CONSUMERS -->
    <rect x="600" y="90" width="250" height="360" rx="16" fill="#F8FAFC" stroke="#CBD5E1" stroke-dasharray="4,4" stroke-width="1.5" />
    <rect x="616" y="80" width="136" height="20" rx="6" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1" />
    <text x="624" y="94" font-family="'Inter', sans-serif" font-weight="bold" font-size="11" fill="#475569">EVENT CONSUMERS</text>


    <!-- Card: WebSocket Bridge -->
    <rect x="620" y="140" width="210" height="60" rx="12" fill="url(#grad-blue)" stroke="none" stroke-width="1.5" filter="url(#shadow)" />


    <text x="636" y="166" font-family="'Inter', sans-serif" font-weight="bold" font-size="14" fill="#FFFFFF">WebSocket Bridge</text>
    <text x="636" y="186" font-family="'Inter', sans-serif" font-size="12" fill="#E2E8F0">Broadcasts events to clients</text>


    <!-- Card: Audit Trail Logger -->
    <rect x="620" y="240" width="210" height="60" rx="12" fill="url(#grad-gray)" stroke="none" stroke-width="1.5" filter="url(#shadow)" />


    <text x="636" y="266" font-family="'Inter', sans-serif" font-weight="bold" font-size="14" fill="#FFFFFF">Audit Trail Logger</text>
    <text x="636" y="286" font-family="'Inter', sans-serif" font-size="12" fill="#E2E8F0">Saves events to audit.jsonl</text>


    <!-- Card: Case File Timeline -->
    <rect x="620" y="340" width="210" height="60" rx="12" fill="url(#grad-gray)" stroke="none" stroke-width="1.5" filter="url(#shadow)" />


    <text x="636" y="366" font-family="'Inter', sans-serif" font-weight="bold" font-size="14" fill="#FFFFFF">Case File Timeline</text>
    <text x="636" y="386" font-family="'Inter', sans-serif" font-size="12" fill="#E2E8F0">Appends visual logs</text>


    <line x1="240" y1="180" x2="320" y2="230" stroke="#4B5563" stroke-width="2" stroke-dasharray="" marker-end="url(#arrow)" />


    <line x1="240" y1="270" x2="320" y2="270" stroke="#4B5563" stroke-width="2" stroke-dasharray="" marker-end="url(#arrow)" />


    <line x1="240" y1="360" x2="320" y2="290" stroke="#4B5563" stroke-width="2" stroke-dasharray="" marker-end="url(#arrow)" />


    <line x1="540" y1="230" x2="620" y2="170" stroke="#4B5563" stroke-width="2" stroke-dasharray="" marker-end="url(#arrow)" />


    <line x1="540" y1="260" x2="620" y2="270" stroke="#4B5563" stroke-width="2" stroke-dasharray="" marker-end="url(#arrow)" />


    <line x1="540" y1="290" x2="620" y2="370" stroke="#4B5563" stroke-width="2" stroke-dasharray="" marker-end="url(#arrow)" />

</svg>
