<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="100%" height="100%">
    <defs>

    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
        <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#000000" flood-opacity="0.06" />
    </filter>


    <filter id="shadow-sm" x="-5%" y="-5%" width="110%" height="110%">
        <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000000" flood-opacity="0.04" />
    </filter>


    <linearGradient id="grad-blue" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#3B82F6" />
        <stop offset="100%" stop-color="#1D4ED8" />
    </linearGradient>


    <linearGradient id="grad-purple" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#8B5CF6" />
        <stop offset="100%" stop-color="#6D28D9" />
    </linearGradient>


    <linearGradient id="grad-orange" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#F59E0B" />
        <stop offset="100%" stop-color="#D97706" />
    </linearGradient>


    <linearGradient id="grad-green" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#10B981" />
        <stop offset="100%" stop-color="#047857" />
    </linearGradient>


    <linearGradient id="grad-gray" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#6B7280" />
        <stop offset="100%" stop-color="#374151" />
    </linearGradient>


    <linearGradient id="grad-red" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#EF4444" />
        <stop offset="100%" stop-color="#B91C1C" />
    </linearGradient>


    <linearGradient id="grad-light-blue" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#EFF6FF" />
        <stop offset="100%" stop-color="#DBEAFE" />
    </linearGradient>


    <marker id="arrow" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
        <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="#4B5563" />
    </marker>


    <marker id="arrow-blue" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
        <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="#2563EB" />
    </marker>

    </defs>

    <!-- Background Canvas -->
    <rect width="900" height="600" fill="#FFFFFF" />
    <rect width="900" height="600" fill="#F1F5F9" opacity="0.4" />


    <text x="30" y="40" font-family="'Inter', sans-serif" font-weight="bold" font-size="16" fill="#1E293B" text-anchor="start">MODEL CONTEXT PROTOCOL (MCP) INTERFACE ARCHITECTURE</text>


    <!-- Group Boundary: GOOGLE ADK AGENTS (CLIENTS) -->
    <rect x="40" y="90" width="250" height="440" rx="16" fill="#F8FAFC" stroke="#CBD5E1" stroke-dasharray="4,4" stroke-width="1.5" />
    <rect x="56" y="80" width="232" height="20" rx="6" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1" />
    <text x="64" y="94" font-family="'Inter', sans-serif" font-weight="bold" font-size="11" fill="#475569">GOOGLE ADK AGENTS (CLIENTS)</text>


    <!-- Card: Log Analyzer Agent -->
    <rect x="60" y="150" width="210" height="70" rx="12" fill="url(#grad-orange)" stroke="none" stroke-width="1.5" filter="url(#shadow)" />


    <text x="76" y="181" font-family="'Inter', sans-serif" font-weight="bold" font-size="14" fill="#FFFFFF">Log Analyzer Agent</text>
    <text x="76" y="201" font-family="'Inter', sans-serif" font-size="12" fill="#E2E8F0">Reads logs through MCP</text>


    <!-- Card: Evaluator Agent -->
    <rect x="60" y="250" width="210" height="70" rx="12" fill="url(#grad-orange)" stroke="none" stroke-width="1.5" filter="url(#shadow)" />


    <text x="76" y="281" font-family="'Inter', sans-serif" font-weight="bold" font-size="14" fill="#FFFFFF">Evaluator Agent</text>
    <text x="76" y="301" font-family="'Inter', sans-serif" font-size="12" fill="#E2E8F0">Checks health endpoints</text>


    <!-- Card: Recovery Planner -->
    <rect x="60" y="350" width="210" height="70" rx="12" fill="url(#grad-orange)" stroke="none" stroke-width="1.5" filter="url(#shadow)" />


    <text x="76" y="381" font-family="'Inter', sans-serif" font-weight="bold" font-size="14" fill="#FFFFFF">Recovery Planner</text>
    <text x="76" y="401" font-family="'Inter', sans-serif" font-size="12" fill="#E2E8F0">Runs runbook mitigations</text>


    <!-- Card: MCP Tool Registry
(Protocol Layer) -->
    <rect x="340" y="240" width="200" height="80" rx="12" fill="url(#grad-purple)" stroke="none" stroke-width="1.5" filter="url(#shadow)" />


    <text x="356" y="276" font-family="'Inter', sans-serif" font-weight="bold" font-size="14" fill="#FFFFFF">MCP Tool Registry
(Protocol Layer)</text>
    <text x="356" y="296" font-family="'Inter', sans-serif" font-size="12" fill="#E2E8F0">JSON-RPC over STDIO/HTTP</text>


    <!-- Group Boundary: DECOUPLED MCP SERVERS -->
    <rect x="590" y="90" width="270" height="440" rx="16" fill="#F8FAFC" stroke="#CBD5E1" stroke-dasharray="4,4" stroke-width="1.5" />
    <rect x="606" y="80" width="184" height="20" rx="6" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1" />
    <text x="614" y="94" font-family="'Inter', sans-serif" font-weight="bold" font-size="11" fill="#475569">DECOUPLED MCP SERVERS</text>


    <!-- Card: Monitoring MCP Server -->
    <rect x="610" y="130" width="230" height="80" rx="12" fill="url(#grad-green)" stroke="none" stroke-width="1.5" filter="url(#shadow)" />


    <text x="626" y="166" font-family="'Inter', sans-serif" font-weight="bold" font-size="14" fill="#FFFFFF">Monitoring MCP Server</text>
    <text x="626" y="186" font-family="'Inter', sans-serif" font-size="12" fill="#E2E8F0">Exposes metrics & telemetry</text>


    <!-- Subcard: Prometheus / Logs API -->
    <rect x="630" y="220" width="190" height="40" rx="8" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1" filter="url(#shadow-sm)" />


    <text x="642" y="238" font-family="'Inter', sans-serif" font-weight="bold" font-size="12" fill="#1E293B">Prometheus / Logs API</text>
    <text x="642" y="254" font-family="'Inter', sans-serif" font-size="10.5" fill="#64748B">Data resource access</text>


    <!-- Card: Incident MCP Server -->
    <rect x="610" y="310" width="230" height="80" rx="12" fill="url(#grad-green)" stroke="none" stroke-width="1.5" filter="url(#shadow)" />


    <text x="626" y="346" font-family="'Inter', sans-serif" font-weight="bold" font-size="14" fill="#FFFFFF">Incident MCP Server</text>
    <text x="626" y="366" font-family="'Inter', sans-serif" font-size="12" fill="#E2E8F0">Exposes topology & action tools</text>


    <!-- Subcard: System Actions tool -->
    <rect x="630" y="400" width="190" height="40" rx="8" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1" filter="url(#shadow-sm)" />


    <text x="642" y="418" font-family="'Inter', sans-serif" font-weight="bold" font-size="12" fill="#1E293B">System Actions tool</text>
    <text x="642" y="434" font-family="'Inter', sans-serif" font-size="10.5" fill="#64748B">Docker & database API tools</text>


    <line x1="270" y1="185" x2="340" y2="260" stroke="#4B5563" stroke-width="2" stroke-dasharray="" marker-end="url(#arrow)" />


    <line x1="270" y1="285" x2="340" y2="285" stroke="#4B5563" stroke-width="2" stroke-dasharray="" marker-end="url(#arrow)" />


    <line x1="270" y1="385" x2="340" y2="300" stroke="#4B5563" stroke-width="2" stroke-dasharray="" marker-end="url(#arrow)" />


    <line x1="540" y1="270" x2="610" y2="180" stroke="#8B5CF6" stroke-width="2" stroke-dasharray="" marker-end="url(#arrow)" />


    <text x="575.0" y="219.0" font-family="'Inter', sans-serif" font-size="11" fill="#8B5CF6" font-weight="bold" text-anchor="middle">Standardized JSON-RPC</text>


    <line x1="540" y1="290" x2="610" y2="360" stroke="#8B5CF6" stroke-width="2" stroke-dasharray="" marker-end="url(#arrow)" />


    <text x="575.0" y="319.0" font-family="'Inter', sans-serif" font-size="11" fill="#8B5CF6" font-weight="bold" text-anchor="middle">Standardized JSON-RPC</text>

</svg>
