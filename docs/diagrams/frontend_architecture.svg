<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 950 550" width="100%" height="100%">
    <defs>

    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
        <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#000000" flood-opacity="0.06" />
    </filter>


    <filter id="shadow-sm" x="-5%" y="-5%" width="110%" height="110%">
        <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000000" flood-opacity="0.04" />
    </filter>


    <linearGradient id="grad-blue" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#3B82F6" />
        <stop offset="100%" stop-color="#1D4ED8" />
    </linearGradient>


    <linearGradient id="grad-purple" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#8B5CF6" />
        <stop offset="100%" stop-color="#6D28D9" />
    </linearGradient>


    <linearGradient id="grad-orange" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#F59E0B" />
        <stop offset="100%" stop-color="#D97706" />
    </linearGradient>


    <linearGradient id="grad-green" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#10B981" />
        <stop offset="100%" stop-color="#047857" />
    </linearGradient>


    <linearGradient id="grad-gray" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#6B7280" />
        <stop offset="100%" stop-color="#374151" />
    </linearGradient>


    <linearGradient id="grad-red" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#EF4444" />
        <stop offset="100%" stop-color="#B91C1C" />
    </linearGradient>


    <linearGradient id="grad-light-blue" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#EFF6FF" />
        <stop offset="100%" stop-color="#DBEAFE" />
    </linearGradient>


    <marker id="arrow" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
        <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="#4B5563" />
    </marker>


    <marker id="arrow-blue" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
        <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="#2563EB" />
    </marker>

    </defs>

    <!-- Background Canvas -->
    <rect width="950" height="550" fill="#FFFFFF" />
    <rect width="950" height="550" fill="#F1F5F9" opacity="0.4" />


    <text x="30" y="40" font-family="'Inter', sans-serif" font-weight="bold" font-size="16" fill="#1E293B" text-anchor="start">REACT SINGLE PAGE APPLICATION ARCHITECTURE</text>


    <!-- Group Boundary: VIEW LAYER (REACT PAGES & COMPONENTS) -->
    <rect x="30" y="90" width="450" height="400" rx="16" fill="#F8FAFC" stroke="#CBD5E1" stroke-dasharray="4,4" stroke-width="1.5" />
    <rect x="46" y="80" width="312" height="20" rx="6" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1" />
    <text x="54" y="94" font-family="'Inter', sans-serif" font-weight="bold" font-size="11" fill="#475569">VIEW LAYER (REACT PAGES & COMPONENTS)</text>


    <!-- Card: Dashboard (/) -->
    <rect x="50" y="140" width="190" height="65" rx="12" fill="url(#grad-blue)" stroke="none" stroke-width="1.5" filter="url(#shadow)" />


    <text x="66" y="168" font-family="'Inter', sans-serif" font-weight="bold" font-size="14" fill="#FFFFFF">Dashboard (/)</text>
    <text x="66" y="188" font-family="'Inter', sans-serif" font-size="12" fill="#E2E8F0">Incidents grid & statistics</text>


    <!-- Card: IncidentDetail (/incident/:id) -->
    <rect x="260" y="140" width="190" height="65" rx="12" fill="url(#grad-blue)" stroke="none" stroke-width="1.5" filter="url(#shadow)" />


    <text x="276" y="168" font-family="'Inter', sans-serif" font-weight="bold" font-size="14" fill="#FFFFFF">IncidentDetail (/incident/:id)</text>
    <text x="276" y="188" font-family="'Inter', sans-serif" font-size="12" fill="#E2E8F0">Terminal feed & agent workflows</text>


    <!-- Card: SystemHealth (/health) -->
    <rect x="50" y="250" width="190" height="65" rx="12" fill="url(#grad-blue)" stroke="none" stroke-width="1.5" filter="url(#shadow)" />


    <text x="66" y="278" font-family="'Inter', sans-serif" font-weight="bold" font-size="14" fill="#FFFFFF">SystemHealth (/health)</text>
    <text x="66" y="298" font-family="'Inter', sans-serif" font-size="12" fill="#E2E8F0">Gateway readiness widgets</text>


    <!-- Card: SystemStream (/stream) -->
    <rect x="260" y="250" width="190" height="65" rx="12" fill="url(#grad-blue)" stroke="none" stroke-width="1.5" filter="url(#shadow)" />


    <text x="276" y="278" font-family="'Inter', sans-serif" font-weight="bold" font-size="14" fill="#FFFFFF">SystemStream (/stream)</text>
    <text x="276" y="298" font-family="'Inter', sans-serif" font-size="12" fill="#E2E8F0">Global event log viewer</text>


    <!-- Subcard: Premium SRE Stylesheet (mission_control.css) -->
    <rect x="50" y="350" width="400" height="110" rx="8" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1" filter="url(#shadow-sm)" />


    <text x="62" y="403" font-family="'Inter', sans-serif" font-weight="bold" font-size="12" fill="#1E293B">Premium SRE Stylesheet (mission_control.css)</text>
    <text x="62" y="419" font-family="'Inter', sans-serif" font-size="10.5" fill="#64748B">Modern glassmorphism UI, vibrant dark mode palette, smooth gradients, grid alignments, micro-animations, Inter typography.</text>


    <!-- Group Boundary: SERVICE & TRANSPORT LAYER -->
    <rect x="520" y="90" width="390" height="400" rx="16" fill="#F8FAFC" stroke="#CBD5E1" stroke-dasharray="4,4" stroke-width="1.5" />
    <rect x="536" y="80" width="216" height="20" rx="6" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1" />
    <text x="544" y="94" font-family="'Inter', sans-serif" font-weight="bold" font-size="11" fill="#475569">SERVICE & TRANSPORT LAYER</text>


    <!-- Card: API Client (services/api.ts) -->
    <rect x="540" y="150" width="350" height="80" rx="12" fill="url(#grad-purple)" stroke="none" stroke-width="1.5" filter="url(#shadow)" />


    <text x="556" y="186" font-family="'Inter', sans-serif" font-weight="bold" font-size="14" fill="#FFFFFF">API Client (services/api.ts)</text>
    <text x="556" y="206" font-family="'Inter', sans-serif" font-size="12" fill="#E2E8F0">REST requests via Fetch API</text>


    <!-- Card: WebSocket Connection Client -->
    <rect x="540" y="280" width="350" height="80" rx="12" fill="url(#grad-purple)" stroke="none" stroke-width="1.5" filter="url(#shadow)" />


    <text x="556" y="316" font-family="'Inter', sans-serif" font-weight="bold" font-size="14" fill="#FFFFFF">WebSocket Connection Client</text>
    <text x="556" y="336" font-family="'Inter', sans-serif" font-size="12" fill="#E2E8F0">Live event receiver & auto-reconnection</text>


    <!-- Subcard: Event Dispatcher -->
    <rect x="540" y="400" width="350" height="60" rx="8" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1" filter="url(#shadow-sm)" />


    <text x="552" y="428" font-family="'Inter', sans-serif" font-weight="bold" font-size="12" fill="#1E293B">Event Dispatcher</text>
    <text x="552" y="444" font-family="'Inter', sans-serif" font-size="10.5" fill="#64748B">Updates local React states dynamically</text>


    <line x1="450" y1="200" x2="540" y2="200" stroke="#3B82F6" stroke-width="2" stroke-dasharray="" marker-end="url(#arrow)" />


    <text x="495.0" y="194.0" font-family="'Inter', sans-serif" font-size="11" fill="#3B82F6" font-weight="bold" text-anchor="middle">REST calls</text>


    <line x1="540" y1="320" x2="450" y2="320" stroke="#10B981" stroke-width="2" stroke-dasharray="" marker-end="url(#arrow)" />


    <text x="495.0" y="314.0" font-family="'Inter', sans-serif" font-size="11" fill="#10B981" font-weight="bold" text-anchor="middle">WebSocket stream</text>

</svg>
