<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="100%" height="100%">
    <defs>

    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
        <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#000000" flood-opacity="0.06" />
    </filter>


    <filter id="shadow-sm" x="-5%" y="-5%" width="110%" height="110%">
        <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000000" flood-opacity="0.04" />
    </filter>


    <linearGradient id="grad-blue" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#3B82F6" />
        <stop offset="100%" stop-color="#1D4ED8" />
    </linearGradient>


    <linearGradient id="grad-purple" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#8B5CF6" />
        <stop offset="100%" stop-color="#6D28D9" />
    </linearGradient>


    <linearGradient id="grad-orange" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#F59E0B" />
        <stop offset="100%" stop-color="#D97706" />
    </linearGradient>


    <linearGradient id="grad-green" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#10B981" />
        <stop offset="100%" stop-color="#047857" />
    </linearGradient>


    <linearGradient id="grad-gray" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#6B7280" />
        <stop offset="100%" stop-color="#374151" />
    </linearGradient>


    <linearGradient id="grad-red" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#EF4444" />
        <stop offset="100%" stop-color="#B91C1C" />
    </linearGradient>


    <linearGradient id="grad-light-blue" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#EFF6FF" />
        <stop offset="100%" stop-color="#DBEAFE" />
    </linearGradient>


    <marker id="arrow" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
        <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="#4B5563" />
    </marker>


    <marker id="arrow-blue" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
        <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="#2563EB" />
    </marker>

    </defs>

    <!-- Background Canvas -->
    <rect width="900" height="600" fill="#FFFFFF" />
    <rect width="900" height="600" fill="#F1F5F9" opacity="0.4" />


    <text x="30" y="40" font-family="'Inter', sans-serif" font-weight="bold" font-size="16" fill="#1E293B" text-anchor="start">STATE TRANSITION DIAGRAM & ESCALATION LIFECYCLE</text>


    <!-- Card: NEW -->
    <rect x="60" y="100" width="160" height="60" rx="12" fill="url(#grad-blue)" stroke="none" stroke-width="1.5" filter="url(#shadow)" />


    <text x="76" y="126" font-family="'Inter', sans-serif" font-weight="bold" font-size="14" fill="#FFFFFF">NEW</text>
    <text x="76" y="146" font-family="'Inter', sans-serif" font-size="12" fill="#E2E8F0">Incident registered</text>


    <line x1="220" y1="130" x2="280" y2="130" stroke="#4B5563" stroke-width="2" stroke-dasharray="" marker-end="url(#arrow)" />


    <text x="250.0" y="124.0" font-family="'Inter', sans-serif" font-size="11" fill="#4B5563" font-weight="bold" text-anchor="middle">Intake</text>


    <!-- Card: TRIAGED -->
    <rect x="280" y="100" width="160" height="60" rx="12" fill="url(#grad-orange)" stroke="none" stroke-width="1.5" filter="url(#shadow)" />


    <text x="296" y="126" font-family="'Inter', sans-serif" font-weight="bold" font-size="14" fill="#FFFFFF">TRIAGED</text>
    <text x="296" y="146" font-family="'Inter', sans-serif" font-size="12" fill="#E2E8F0">Severity assessed</text>


    <line x1="440" y1="130" x2="500" y2="130" stroke="#4B5563" stroke-width="2" stroke-dasharray="" marker-end="url(#arrow)" />


    <text x="470.0" y="124.0" font-family="'Inter', sans-serif" font-size="11" fill="#4B5563" font-weight="bold" text-anchor="middle">Investigation</text>


    <!-- Card: INVESTIGATING -->
    <rect x="500" y="100" width="160" height="60" rx="12" fill="url(#grad-orange)" stroke="none" stroke-width="1.5" filter="url(#shadow)" />


    <text x="516" y="126" font-family="'Inter', sans-serif" font-weight="bold" font-size="14" fill="#FFFFFF">INVESTIGATING</text>
    <text x="516" y="146" font-family="'Inter', sans-serif" font-size="12" fill="#E2E8F0">Log analysis active</text>


    <line x1="660" y1="130" x2="720" y2="130" stroke="#4B5563" stroke-width="2" stroke-dasharray="" marker-end="url(#arrow)" />


    <text x="690.0" y="124.0" font-family="'Inter', sans-serif" font-size="11" fill="#4B5563" font-weight="bold" text-anchor="middle">Deduction</text>


    <!-- Card: ROOT CAUSE -->
    <rect x="720" y="100" width="160" height="60" rx="12" fill="url(#grad-orange)" stroke="none" stroke-width="1.5" filter="url(#shadow)" />


    <text x="736" y="126" font-family="'Inter', sans-serif" font-weight="bold" font-size="14" fill="#FFFFFF">ROOT CAUSE</text>
    <text x="736" y="146" font-family="'Inter', sans-serif" font-size="12" fill="#E2E8F0">Origin verified</text>


    <line x1="800" y1="160" x2="800" y2="240" stroke="#4B5563" stroke-width="2" stroke-dasharray="" marker-end="url(#arrow)" />


    <text x="800.0" y="194.0" font-family="'Inter', sans-serif" font-size="11" fill="#4B5563" font-weight="bold" text-anchor="middle">Propose Fix</text>


    <!-- Card: EVALUATING -->
    <rect x="720" y="240" width="160" height="60" rx="12" fill="url(#grad-orange)" stroke="none" stroke-width="1.5" filter="url(#shadow)" />


    <text x="736" y="266" font-family="'Inter', sans-serif" font-weight="bold" font-size="14" fill="#FFFFFF">EVALUATING</text>
    <text x="736" y="286" font-family="'Inter', sans-serif" font-size="12" fill="#E2E8F0">Impact evaluated</text>


    <line x1="720" y1="270" x2="660" y2="270" stroke="#4B5563" stroke-width="2" stroke-dasharray="" marker-end="url(#arrow)" />


    <text x="690.0" y="264.0" font-family="'Inter', sans-serif" font-size="11" fill="#4B5563" font-weight="bold" text-anchor="middle">Actionable?</text>


    <!-- Card: MITIGATING -->
    <rect x="500" y="240" width="160" height="60" rx="12" fill="url(#grad-orange)" stroke="none" stroke-width="1.5" filter="url(#shadow)" />


    <text x="516" y="266" font-family="'Inter', sans-serif" font-weight="bold" font-size="14" fill="#FFFFFF">MITIGATING</text>
    <text x="516" y="286" font-family="'Inter', sans-serif" font-size="12" fill="#E2E8F0">Playbook run</text>


    <line x1="500" y1="270" x2="440" y2="270" stroke="#4B5563" stroke-width="2" stroke-dasharray="" marker-end="url(#arrow)" />


    <text x="470.0" y="264.0" font-family="'Inter', sans-serif" font-size="11" fill="#4B5563" font-weight="bold" text-anchor="middle">Verify</text>


    <!-- Card: RESOLVED -->
    <rect x="280" y="240" width="160" height="60" rx="12" fill="url(#grad-green)" stroke="none" stroke-width="1.5" filter="url(#shadow)" />


    <text x="296" y="266" font-family="'Inter', sans-serif" font-weight="bold" font-size="14" fill="#FFFFFF">RESOLVED</text>
    <text x="296" y="286" font-family="'Inter', sans-serif" font-size="12" fill="#E2E8F0">Metric healthy</text>


    <line x1="280" y1="270" x2="220" y2="270" stroke="#10B981" stroke-width="2" stroke-dasharray="" marker-end="url(#arrow)" />


    <text x="250.0" y="264.0" font-family="'Inter', sans-serif" font-size="11" fill="#10B981" font-weight="bold" text-anchor="middle">Close</text>


    <!-- Card: CLOSED -->
    <rect x="60" y="240" width="160" height="60" rx="12" fill="url(#grad-gray)" stroke="none" stroke-width="1.5" filter="url(#shadow)" />


    <text x="76" y="266" font-family="'Inter', sans-serif" font-weight="bold" font-size="14" fill="#FFFFFF">CLOSED</text>
    <text x="76" y="286" font-family="'Inter', sans-serif" font-size="12" fill="#E2E8F0">Case post-mortem done</text>


    <!-- Group Boundary: ESCALATION BYPASS -->
    <rect x="220" y="360" width="440" height="180" rx="16" fill="#FEE2E2" stroke="#EF4444" stroke-dasharray="4,4" stroke-width="1.5" />
    <rect x="236" y="350" width="152" height="20" rx="6" fill="#FFFFFF" stroke="#EF4444" stroke-width="1" />
    <text x="244" y="364" font-family="'Inter', sans-serif" font-weight="bold" font-size="11" fill="#475569">ESCALATION BYPASS</text>


    <!-- Card: PENDING APPROVAL -->
    <rect x="250" y="420" width="160" height="60" rx="12" fill="url(#grad-purple)" stroke="none" stroke-width="1.5" filter="url(#shadow)" />


    <text x="266" y="446" font-family="'Inter', sans-serif" font-weight="bold" font-size="14" fill="#FFFFFF">PENDING APPROVAL</text>
    <text x="266" y="466" font-family="'Inter', sans-serif" font-size="12" fill="#E2E8F0">Manual gate active</text>


    <!-- Card: ESCALATED -->
    <rect x="470" y="420" width="160" height="60" rx="12" fill="url(#grad-red)" stroke="none" stroke-width="1.5" filter="url(#shadow)" />


    <text x="486" y="446" font-family="'Inter', sans-serif" font-weight="bold" font-size="14" fill="#FFFFFF">ESCALATED</text>
    <text x="486" y="466" font-family="'Inter', sans-serif" font-size="12" fill="#E2E8F0">Paged human operator</text>


    <path d="M 580 160 C 580 320, 330 320, 330 420" fill="none" stroke="#EF4444" stroke-width="2" stroke-dasharray="2,2" marker-end="url(#arrow)" />


    <text x="450" y="350" font-family="'Inter', sans-serif" font-size="11" fill="#EF4444" font-weight="bold" text-anchor="middle">Requires Approval</text>


    <path d="M 330 480 C 330 520, 580 520, 580 300" fill="none" stroke="#10B981" stroke-width="2" stroke-dasharray="" marker-end="url(#arrow)" />


    <text x="450" y="510" font-family="'Inter', sans-serif" font-size="11" fill="#10B981" font-weight="bold" text-anchor="middle">Approved</text>


    <line x1="410" y1="450" x2="470" y2="450" stroke="#EF4444" stroke-width="2" stroke-dasharray="" marker-end="url(#arrow)" />


    <text x="440.0" y="444.0" font-family="'Inter', sans-serif" font-size="11" fill="#EF4444" font-weight="bold" text-anchor="middle">Timeout / Denied</text>

</svg>
