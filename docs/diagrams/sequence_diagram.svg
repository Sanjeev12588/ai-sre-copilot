<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 950 650" width="100%" height="100%">
    <defs>

    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
        <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#000000" flood-opacity="0.06" />
    </filter>


    <filter id="shadow-sm" x="-5%" y="-5%" width="110%" height="110%">
        <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000000" flood-opacity="0.04" />
    </filter>


    <linearGradient id="grad-blue" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#3B82F6" />
        <stop offset="100%" stop-color="#1D4ED8" />
    </linearGradient>


    <linearGradient id="grad-purple" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#8B5CF6" />
        <stop offset="100%" stop-color="#6D28D9" />
    </linearGradient>


    <linearGradient id="grad-orange" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#F59E0B" />
        <stop offset="100%" stop-color="#D97706" />
    </linearGradient>


    <linearGradient id="grad-green" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#10B981" />
        <stop offset="100%" stop-color="#047857" />
    </linearGradient>


    <linearGradient id="grad-gray" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#6B7280" />
        <stop offset="100%" stop-color="#374151" />
    </linearGradient>


    <linearGradient id="grad-red" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#EF4444" />
        <stop offset="100%" stop-color="#B91C1C" />
    </linearGradient>


    <linearGradient id="grad-light-blue" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#EFF6FF" />
        <stop offset="100%" stop-color="#DBEAFE" />
    </linearGradient>


    <marker id="arrow" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
        <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="#4B5563" />
    </marker>


    <marker id="arrow-blue" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
        <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="#2563EB" />
    </marker>

    </defs>

    <!-- Background Canvas -->
    <rect width="950" height="650" fill="#FFFFFF" />
    <rect width="950" height="650" fill="#F1F5F9" opacity="0.4" />


    <text x="30" y="40" font-family="'Inter', sans-serif" font-weight="bold" font-size="16" fill="#1E293B" text-anchor="start">COOPERATIVE SRE INCIDENT RESOLUTION SEQUENCE DIAGRAM</text>


    <!-- Participant Line: User -->
    <line x1="100" y1="80" x2="100" y2="580" stroke="#CBD5E1" stroke-width="2" stroke-dasharray="4,4" />
    <rect x="50" y="80" width="100" height="36" rx="6" fill="#1E293B" filter="url(#shadow-sm)" />
    <text x="100" y="103" font-family="'Inter', sans-serif" font-weight="bold" font-size="12" fill="#FFFFFF" text-anchor="middle">User</text>


    <!-- Participant Line: Dashboard -->
    <line x1="220" y1="80" x2="220" y2="580" stroke="#CBD5E1" stroke-width="2" stroke-dasharray="4,4" />
    <rect x="170" y="80" width="100" height="36" rx="6" fill="#1E293B" filter="url(#shadow-sm)" />
    <text x="220" y="103" font-family="'Inter', sans-serif" font-weight="bold" font-size="12" fill="#FFFFFF" text-anchor="middle">Dashboard</text>


    <!-- Participant Line: FastAPI -->
    <line x1="360" y1="80" x2="360" y2="580" stroke="#CBD5E1" stroke-width="2" stroke-dasharray="4,4" />
    <rect x="310" y="80" width="100" height="36" rx="6" fill="#1E293B" filter="url(#shadow-sm)" />
    <text x="360" y="103" font-family="'Inter', sans-serif" font-weight="bold" font-size="12" fill="#FFFFFF" text-anchor="middle">FastAPI</text>


    <!-- Participant Line: Orchestrator -->
    <line x1="500" y1="80" x2="500" y2="580" stroke="#CBD5E1" stroke-width="2" stroke-dasharray="4,4" />
    <rect x="450" y="80" width="100" height="36" rx="6" fill="#1E293B" filter="url(#shadow-sm)" />
    <text x="500" y="103" font-family="'Inter', sans-serif" font-weight="bold" font-size="12" fill="#FFFFFF" text-anchor="middle">Orchestrator</text>


    <!-- Participant Line: Agents (ADK) -->
    <line x1="660" y1="80" x2="660" y2="580" stroke="#CBD5E1" stroke-width="2" stroke-dasharray="4,4" />
    <rect x="610" y="80" width="100" height="36" rx="6" fill="#1E293B" filter="url(#shadow-sm)" />
    <text x="660" y="103" font-family="'Inter', sans-serif" font-weight="bold" font-size="12" fill="#FFFFFF" text-anchor="middle">Agents (ADK)</text>


    <!-- Participant Line: MCP Servers -->
    <line x1="820" y1="80" x2="820" y2="580" stroke="#CBD5E1" stroke-width="2" stroke-dasharray="4,4" />
    <rect x="770" y="80" width="100" height="36" rx="6" fill="#1E293B" filter="url(#shadow-sm)" />
    <text x="820" y="103" font-family="'Inter', sans-serif" font-weight="bold" font-size="12" fill="#FFFFFF" text-anchor="middle">MCP Servers</text>


    <line x1="100" y1="140" x2="220" y2="140" stroke="#2563EB" stroke-width="2" stroke-dasharray="" marker-end="url(#arrow-blue)" />


    <text x="160.0" y="134.0" font-family="'Inter', sans-serif" font-size="11" fill="#2563EB" font-weight="bold" text-anchor="middle">Simulate Alert</text>


    <line x1="220" y1="180" x2="360" y2="180" stroke="#2563EB" stroke-width="2" stroke-dasharray="" marker-end="url(#arrow-blue)" />


    <text x="290.0" y="174.0" font-family="'Inter', sans-serif" font-size="11" fill="#2563EB" font-weight="bold" text-anchor="middle">POST /api/incidents</text>


    <line x1="360" y1="220" x2="500" y2="220" stroke="#2563EB" stroke-width="2" stroke-dasharray="" marker-end="url(#arrow-blue)" />


    <text x="430.0" y="214.0" font-family="'Inter', sans-serif" font-size="11" fill="#2563EB" font-weight="bold" text-anchor="middle">Trigger execute_workflow</text>


    <line x1="500" y1="260" x2="660" y2="260" stroke="#2563EB" stroke-width="2" stroke-dasharray="" marker-end="url(#arrow-blue)" />


    <text x="580.0" y="254.0" font-family="'Inter', sans-serif" font-size="11" fill="#2563EB" font-weight="bold" text-anchor="middle">Initialize ADK Agents</text>


    <line x1="660" y1="300" x2="820" y2="300" stroke="#2563EB" stroke-width="2" stroke-dasharray="" marker-end="url(#arrow-blue)" />


    <text x="740.0" y="294.0" font-family="'Inter', sans-serif" font-size="11" fill="#2563EB" font-weight="bold" text-anchor="middle">Call MCP Tools (e.g. read logs)</text>


    <line x1="820" y1="350" x2="660" y2="350" stroke="#4B5563" stroke-width="2" stroke-dasharray="" marker-end="url(#arrow)" />


    <text x="740.0" y="344.0" font-family="'Inter', sans-serif" font-size="11" fill="#4B5563" font-weight="bold" text-anchor="middle">JSON-RPC Response</text>


    <line x1="660" y1="400" x2="500" y2="400" stroke="#4B5563" stroke-width="2" stroke-dasharray="" marker-end="url(#arrow)" />


    <text x="580.0" y="394.0" font-family="'Inter', sans-serif" font-size="11" fill="#4B5563" font-weight="bold" text-anchor="middle">Yield execution progress event</text>


    <line x1="500" y1="440" x2="360" y2="440" stroke="#4B5563" stroke-width="2" stroke-dasharray="" marker-end="url(#arrow)" />


    <text x="430.0" y="434.0" font-family="'Inter', sans-serif" font-size="11" fill="#4B5563" font-weight="bold" text-anchor="middle">Publish to Event Bus</text>


    <line x1="360" y1="480" x2="220" y2="480" stroke="#4B5563" stroke-width="2" stroke-dasharray="" marker-end="url(#arrow)" />


    <text x="290.0" y="474.0" font-family="'Inter', sans-serif" font-size="11" fill="#4B5563" font-weight="bold" text-anchor="middle">WebSocket Event Broadcast</text>


    <line x1="220" y1="520" x2="100" y2="520" stroke="#4B5563" stroke-width="2" stroke-dasharray="" marker-end="url(#arrow)" />


    <text x="160.0" y="514.0" font-family="'Inter', sans-serif" font-size="11" fill="#4B5563" font-weight="bold" text-anchor="middle">Visual Notification on UI</text>

</svg>
